# alerts/mcp_alerts.yml
groups:
  - name: cathedral_mcp_alerts
    interval: 30s
    rules:
      # P1 - Critical: Server Down
      - alert: MCPDown
        expr: up{job="cathedral-mcp"} == 0
        for: 1m
        labels:
          severity: critical
          component: mcp-server
        annotations:
          summary: "MCP Server is down"
          description: "{{ $labels.instance }} has been down for more than 1 minute."

      # P1 - Critical: High Error Rate
      - alert: HighErrorRate
        expr: rate(mcp_requests_total{status=~"5.."}[5m]) / rate(mcp_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          component: mcp-server
        annotations:
          summary: "High 5xx Error Rate"
          description: "Error rate has exceeded 5% on {{ $labels.instance }}."

      # P2 - High: Circuit Breaker Open
      - alert: CircuitBreakerOpen
        expr: circuit_breaker_state{state="open"} == 1
        for: 1m
        labels:
          severity: high
          component: mcp-server
        annotations:
          summary: "Circuit Breaker Open"
          description: "Circuit breaker for {{ $labels.component }} is OPEN."

      # P2 - High: DLQ Overflow
      - alert: DLQOverflow
        expr: dlq_size > 1000
        for: 5m
        labels:
          severity: high
          component: redis
        annotations:
          summary: "DLQ Size is too large"
          description: "DLQ has over 1000 messages for more than 5 minutes."

      # P3 - Medium: Poison Pills Detected
      - alert: PoisonPillDetected
        expr: increase(poison_pills_detected_total[1h]) > 5
        for: 5m
        labels:
          severity: warning
          component: mcp-server
        annotations:
          summary: "Multiple Poison Pills Detected"
          description: "More than 5 poison pills detected in the last hour."

      # P3 - Medium: Seal Denials Spiking
      - alert: HighSealDenials
        expr: rate(seal_access_denials_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          component: security
        annotations:
          summary: "High rate of Seal Access Denials"
          description: "Seal access denials are exceeding 10/sec on {{ $labels.instance }}."

      # P3 - Medium: High Latency
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(mcp_request_duration_seconds_bucket[5m])) > 2.0
        for: 5m
        labels:
          severity: warning
          component: mcp-server
        annotations:
          summary: "High P95 Latency"
          description: "P95 latency is over 2 seconds."
