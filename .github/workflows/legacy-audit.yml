name: Legacy Code Audit
on:
  schedule:
    - cron: '0 0 * * 0'  # Semanalmente
  pull_request:
    paths:
      - 'crates/**/*.rs'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run cargo-audit for known vulnerabilities
        run: |
          cargo install cargo-audit
          cargo audit
      - name: Run cargo-deny for license/policy compliance
        run: |
          cargo install cargo-deny
          cargo deny check
