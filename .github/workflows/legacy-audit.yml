name: Legacy Code Audit
on:
  schedule:
    - cron: '0 0 * * 0'  # Semanalmente
  pull_request:
    paths:
      - 'crates/**/*.rs'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup default nightly-2026-06-15
      - name: Run cargo-audit for known vulnerabilities
        run: |
          cargo install cargo-audit
          cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2025-0141 --ignore RUSTSEC-2024-0380 --ignore RUSTSEC-2026-0163 --ignore RUSTSEC-2026-0162
      - name: Run cargo-deny for license/policy compliance
        run: |
          cargo install cargo-deny
          cargo deny check || true
