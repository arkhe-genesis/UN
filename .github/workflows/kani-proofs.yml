name: Kani Proofs

on:
  push:
    paths:
      - 'crates/arkhe-core/**/*.rs'
      - 'crates/arkhe-forge/**/*.rs'
  pull_request:
    paths:
      - 'crates/arkhe-core/**/*.rs'
      - 'crates/arkhe-forge/**/*.rs'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly)
        run: |
          rustup default nightly-2026-06-15
          rustup component add rust-src

      - name: Install Kani
        run: |
          cargo install --locked kani-verifier
          cargo kani setup
          kani --version

      - name: Run Kani proofs on arkhe-core
        run: |
          cd crates/arkhe-core
          cargo kani --harness verify_find_char_bounds
          cargo kani --harness verify_no_squidbleed_pattern

      - name: Run Kani proofs on arkhe-forge
        run: |
          cd crates/arkhe-forge
          cargo kani --harness verify_host_boundary
          cargo kani --harness verify_wasm_sandbox
