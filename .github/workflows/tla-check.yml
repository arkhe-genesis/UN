name: TLA+ Verification (Apalache)

on:
  push:
    paths:
      - 'specs/**/*.tla'
      - 'specs/**/*.cfg'
  pull_request:
    paths:
      - 'specs/**/*.tla'
      - 'specs/**/*.cfg'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Apalache
        run: |
          wget https://github.com/informalsystems/apalache/releases/download/v0.49.0/apalache.zip
          unzip apalache.zip
          chmod +x apalache/bin/apalache-mc

      - name: Check TLA+ modules
        run: |
          ./apalache/bin/apalache-mc typecheck specs/squidbleed_detection.tla
          ./apalache/bin/apalache-mc check --inv=Invariant specs/squidbleed_detection.tla
          ./apalache/bin/apalache-mc check --inv=SafetyProperty specs/squidbleed_detection.tla
