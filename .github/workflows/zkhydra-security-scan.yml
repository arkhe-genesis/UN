name: zkHydra Security Scan

on:
  pull_request:
    paths:
      - '**/*.circom'
  push:
    branches:
      - main
      - develop
    paths:
      - '**/*.circom'

jobs:
  zkhydra-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest
          docker pull ghcr.io/zksecurity/zkhydra:latest

      - name: Run zkHydra on circom files
        run: |
          FINDINGS=0
          for circuit in $(find . -name "*.circom"); do
            echo "Scanning $circuit with zkHydra..."
            PYTHONPATH=$(pwd) python -m cathedral.zkhydra_gateway analyze \
              --circuit "$circuit" \
              --tools all \
              --fail-on-finding \
              --output "security-report-$(basename $circuit).json" || FINDINGS=1
          done

          if [ $FINDINGS -eq 1 ]; then
            echo "Vulnerabilities found in circom circuits!"
            bash -c "exit 1"
          fi
